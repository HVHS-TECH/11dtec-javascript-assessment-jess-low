<!DOCTYPE html>
<html>
<head>
<title>Café Aotearoa</title>
<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/b/b3/New_Zealand_Topography.jpg">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    div.gallery {
        margin: 5px;
        border: 1px solid #ccc;
        width: 400px;
    }
    div.gallery-item {
        padding: 15px;
        margin: 50px;
        border: 1px solid #ccc;
        width: 400px;
    }
</style>
</head>
<body>

<div id="bar" class="w3-top"class="w3-bar-item w3-button custom-brown custom-hover w3-padding-16" style="width:25%; text-align: center;>
    <h1>Café Aotearoa</h1>
</div>

<div class="gallery-item">
<h2 style="text-align: center;">Hot drinks:</h2>
<form onsubmit="return false;">
    <label for="flatWhite">$5.50: Flat White</label>
    <input type="number" id="flat" name="flatWhite" min="0" placeholder="Amount...">
    <input type="submit" onClick="getFlatWhite()">
</form>
<br>
<form onsubmit="return false;">
    <label for="longBlack">$5: Long Black</label>
    <input type="number" id="long" name="longBlack" min="0" placeholder="Amount...">
    <input type="submit" onClick="getLongBlack()">
</form>
<br>
</div>

<div class="gallery-item">
<h2 style="text-align: center;">Cold drinks:</h2>
<form onsubmit="return false;">
    <label for="orangeJuice">$5.50: Orange Juice</label>
    <input type="number" id="orange" name="orangeJuice" min="0" placeholder="Amount...">
    <input type="submit" onClick="getOrangeJuice()">
</form>
<br>
<form onsubmit="return false;">
    <label for="appleJuice">$5.50: Apple Juice</label>
    <input type="number" id="apple" name="appleJuice" min="0" placeholder="Amount...">
    <input type="submit" onClick="getAppleJuice()">
</form>
<br>
</div>

<div class="gallery-item">
<h2 style="text-align: center;">Food:</h2>
<form onsubmit="return false;">
    <label for="blueberryMuffin">$5: Blueberry Muffin</label>
    <input type="number" id="blueberry" name="blueberryMuffin" min="0" placeholder="Amount...">
    <input type="submit" onClick="getBlueberryMuffin()">
</form>
<br>
<form onsubmit="return false;">
    <label for="cheeseScone">$6: Cheese Scone</label>
    <input type="number" id="cheese" name="cheeseScone min="0" placeholder="Amount...">
    <input type="submit" onClick="getCheeseScone()">
</form>
<br>
</div>

<div class="gallery-item">
<h2>Name:</h2>
<form onsubmit="return false;">
    <label for="nameAdd"></label>
    <input type="text" id="name" name="nameAdd" placeholder="Name..." required>
    <input type="submit" onClick="getName()">
</form>

<h2>Money:</h2>
<form onsubmit="return false;">
    <label for="moneyAdd">$</label>
    <input type="number" id="money" name="moneyAdd" placeholder="$..." step="0.01" required>
    <input type="submit" onClick="getMoney()">
</form>
</div>
<br>
<button id="order" onclick="viewItems()">View items on order:</button>

  <div class="gallery" style="text-align: center; display: none;" id="spaceForJavaScriptOutput"></div>

<button id="receipt" onclick="getReceipt()" style="display: none;">Receipt:</button>
<br>
<button id="clear" onclick="clearAll()" style="display: none;">Clear All:</button>
<button id="cancel" onclick="cancelAll()" style="display: none;">Cancel Order</button>
<script src="script.js"></script>
</body>
</html>
