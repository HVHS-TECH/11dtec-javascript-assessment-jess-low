<!DOCTYPE html>
<html>
<head>
<title>Café Aotearoa</title>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>
<body>

<h1>Café Aotearoa</h1>
<h2>Hot drinks:</h2>
<form onsubmit="return false;">
    <label for="flatWhite">$6: Flat White</label>
    <input type="number" id="flat" name="flatWhite" min="0" placeholder="Amount...">
    <input type="submit" onClick="getFlatWhite()">
</form>
<h2>Cold drinks:</h2>
<form onsubmit="return false;">
    <label for="orangeJuice">$6: Orange Juice</label>
    <input type="number" id="orange" name="orangeJuice" min="0" placeholder="Amount...">
    <input type="submit" onClick="getOrangeJuice()">
</form>
<h2>Food:</h2>
<form onsubmit="return false;">
    <label for="blueberryMuffin">$5: Blueberry Muffin</label>
    <input type="number" id="blueberry" name="blueberryMuffin" min="0" placeholder="Amount...">
    <input type="submit" onClick="getBlueberryMuffin()">
</form>

<h2>Name:</h2>
<form onsubmit="return false;">
    <label for="nameAdd"></label>
    <input type="text" id="name" name="nameAdd" placeholder="Name...">
    <input type="submit" onClick="getName()">
</form>

<br>
<button onclick="receipt()">Receipt:</button>

  <div id="spaceForJavaScriptOutput"></div>
  
<script src="script.js"></script>
</body>
</html>
