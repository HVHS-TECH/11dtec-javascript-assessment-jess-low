<!DOCTYPE html>
<html>
<head>
<title>Café Aotearoa</title>
<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/b/b3/New_Zealand_Topography.jpg">
<link href='https://fonts.googleapis.com/css?family=Princess Sofia' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Amita' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Sofia' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Zen Old Mincho' rel='stylesheet'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://www.w3schools.com/w3css/5/w3.css" rel="stylesheet">
<style>
    div.center-gallery {
        display: grid;
        grid-template-columns: auto;
        justify-content: center;
    }
    div.gallery-item {
        text-align: center;
        padding: 15px;
        margin: 10px;
        border: 1px solid #000000 !important;
        color: white !important;
        width: 550px;
        background-color: #26631a !important;
    }
      .stripe {
        background-color: #26631a !important;
        color: white !important;
        border: 2px solid #000000 !important;
      }
      .button {
        text-align: center;
        border-radius: 20px;
        padding: 10px;
        margin: 10px;
        width: 550px;
        background-color: #51768f;
        color: white !important;
        border: 2px solid #000000 !important;
      }
      .button:hover {
        background-color: rgb(171, 208, 243);
        border: 2px solid #000000 !important;
        color: rgb(0, 0, 0) !important;
      }
      .buttons {
        background-color: #6c9e6a;
        color: white !important;
        border: 1px solid #000000 !important;
      }
      .buttons:hover {
        background-color: #9ec68b;
        border: 1px solid #000000 !important;
        color: rgb(0, 0, 0) !important;
      }
      body {
        background-color: rgb(138, 182, 138) !important;
      }
</style>
</head>
<body>
<div id="bar" class="w3-top w3-bar stripe w3-padding-5" style="text-align: center;">
    <h1 style="font-family: Princess Sofia;">Café Aotearoa</h1>
</div>
<br><br><br><br>
<h1 style="text-align: center; font-family: Sofia;">Menu:</h1>
<div class="center-gallery">
<div class="gallery-item">
<h2 style="font-family: Amita;">Hot drinks:</h2>
<form onsubmit="return false;">
    <label for="flatWhite" style="font-family: Amita;">$5.50: Flat White</label>
    <input type="number" id="flat" name="flatWhite" min="0" placeholder="Amount...">
    <input type="submit" onClick="getFlatWhite()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="longBlack" style="font-family: Amita;">$5: Long Black</label>
    <input type="number" id="long" name="longBlack" min="0" placeholder="Amount...">
    <input type="submit" onClick="getLongBlack()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="hotChocolate" style="font-family: Amita;">$5: Hot Chocolate</label>
    <input type="number" id="hot" name="hotChocolate" min="0" placeholder="Amount...">
    <input type="submit" onClick="getHotChocolate()" value="Add To Order" class="buttons">
</form>
<br>
</div>

<div class="gallery-item">
<h2 style="font-family: Amita;">Cold drinks:</h2>
<form onsubmit="return false;">
    <label for="orangeJuice" style="font-family: Amita;">$5.50: Orange Juice</label>
    <input type="number" id="orange" name="orangeJuice" min="0" placeholder="Amount...">
    <input type="submit" onClick="getOrangeJuice()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="appleJuice" style="font-family: Amita;">$5.50: Apple Juice</label>
    <input type="number" id="apple" name="appleJuice" min="0" placeholder="Amount...">
    <input type="submit" onClick="getAppleJuice()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="lP" style="font-family: Amita;">$4: L&P</label>
    <input type="number" id="l" name="lP" min="0" placeholder="Amount...">
    <input type="submit" onClick="getLP()" value="Add To Order" class="buttons">
</form>
<br>
</div>

<div class="gallery-item">
<h2 style="font-family: Amita;">Food:</h2>
<form onsubmit="return false;">
    <label for="blueberryMuffin" style="font-family: Amita;">$5: Blueberry Muffin</label>
    <input type="number" id="blueberry" name="blueberryMuffin" min="0" placeholder="Amount...">
    <input type="submit" onClick="getBlueberryMuffin()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="cheeseScone" style="font-family: Amita;">$6: Cheese Scone</label>
    <input type="number" id="cheese" name="cheeseScone" min="0" placeholder="Amount...">
    <input type="submit" onClick="getCheeseScone()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="quicheLorraine" style="font-family: Amita;">$8: Quiche Lorraine</label>
    <input type="number" id="quiche" name="quicheLorraine" min="0" placeholder="Amount...">
    <input type="submit" onClick="getQuicheLorraine()" value="Add To Order" class="buttons">
</form>
<br>
</div>

<br>
<button id="order" class="button" onclick="viewItems()">View items on order:</button>
<div class="gallery-item" style="text-align: center; display: none;" id="spaceForJavaScriptOutput"></div>
<div class="gallery-item" style="display: none;" id="nameMoney">
<form onsubmit="return false;" >
    <label for="nameAdd" style="font-size: 20px; font-family: Amita;">Name:</label>
    <input type="text" id="name" name="nameAdd" placeholder="Name..." required>
    <input type="submit" onClick="getName()" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="moneyAdd" style="font-size: 20px; font-family: Amita;">Money: $</label>
    <input type="number" id="money" name="moneyAdd" placeholder="$..." step="0.01" required>
    <input type="submit" onClick="getMoney()" class="buttons">
</form>
</div>
<button id="receipt" onclick="getReceipt()" style="display: none;" class="button">Receipt:</button>
<br>
<button id="clear" onclick="clearAll()" style="display: none;" class="button">Clear All:</button>
<button id="cancel" onclick="cancelAll()" style="display: none;" class="button">Cancel Order</button>
</div>
<br>
<script src="script.js"></script>
</body>
</html>
