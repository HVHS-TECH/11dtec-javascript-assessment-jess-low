<!DOCTYPE html>
<html>
<head>
<title>Café Aotearoa</title>

<link rel="icon" href="https://upload.wikimedia.org/wikipedia/commons/b/b3/New_Zealand_Topography.jpg">
<link href='https://fonts.googleapis.com/css?family=Princess Sofia' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Amita' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Sofia' rel='stylesheet'>
<link href='https://fonts.googleapis.com/css?family=Zen Old Mincho' rel='stylesheet'>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link href="https://www.w3schools.com/w3css/5/w3.css" rel="stylesheet">
<style>

    div.center-gallery {
        display: grid;
        grid-template-columns: auto;
        justify-content: center;
    }
    div.gallery-item {
        text-align: center;
        padding: 15px;
        margin: 10px;
        border: 1px solid #000000 !important;
        color: white !important;
        width: 550px;
        background-color: #26631a !important;
    }
    div.gallery-items {
        text-align: right;
        color: white !important;
        width: 100%;
        background-color: #26631a !important;
    }
      .stripe {
        background-color: #26631a !important;
        color: white !important;
        border: 2px solid #000000 !important;
      }
      .button {
        text-align: center;
        border-radius: 20px;
        padding: 10px;
        margin: 10px;
        width: 550px;
        background-color: #51768f;
        color: white !important;
        border: 2px solid #000000 !important;
      }
      .button:hover {
        background-color: rgb(171, 208, 243);
        border: 2px solid #000000 !important;
        color: rgb(0, 0, 0) !important;
      }
      .buttons {
        background-color: #6c9e6a;
        color: white !important;
        border: 1px solid #000000 !important;
      }
      .buttons:hover {
        background-color: #9ec68b;
        border: 1px solid #000000 !important;
        color: rgb(0, 0, 0) !important;
      }
      body {
        background-color: rgb(138, 182, 138) !important;
      }
      .dropdown-container {
        position: relative;
      }
      .dropdown-content {
        display: none;
        position: absolute;
        right: 20px;
        top: 85px;
      }
</style>
</head>
<body>
<div id="bar" class="w3-top w3-bar stripe w3-padding-5" style="text-align: center;">
    <p style="width: 20%;" class="w3-left w3-bar-item"></p>
    <h1 style="font-family: Princess Sofia; font-size: 55px; width: 60%;" class="w3-bar-item">Café Aotearoa</h1>
    <div class="dropdown-container">
    <p class="w3-right w3-bar-item w3-button" style="width: 20%; font-size: 25px; font-family: Sofia;" onclick="disp()">Contact:</p>
    <div id="contactDropdown" class="dropdown-content">
        <input type="text" value="cafe.aotearoa@exampledomain.com" style="display: none;" id="copy">
        <button onclick="copy()">cafe.aotearoa@exampledomain.com</button>
    </div>
</div>
</div>
<p style="font-size: 130px;"></p>
<h1 style="text-align: center; font-family: Sofia;">Menu:</h1>
<div class="center-gallery">
<div class="gallery-item">
<h2 style="font-family: Amita;">Hot drinks:</h2>
<div class="gallery-items">
<form onsubmit="return false;">
    <label for="flatWhite" style="font-size: 18px; font-family: Amita;">$5.50: Flat White</label>
    <input type="number" style="width: 200px;" id="flat" name="flatWhite" min="1" max="25" placeholder="Amount...">
    <input type="submit" onClick="getFlatWhite()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="longBlack" style="font-size: 18px; font-family: Amita;">$5: Long Black</label>
    <input type="number" style="width: 200px;" id="long" name="longBlack" min="1" max="25" placeholder="Amount...">
    <input type="submit" onClick="getLongBlack()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="hotChocolate" style="font-size: 18px; font-family: Amita;">$5: Hot Chocolate</label>
    <input type="number" style="width: 200px;" id="hot" name="hotChocolate" min="1" max="25" placeholder="Amount...">
    <input type="submit" onClick="getHotChocolate()" value="Add To Order" class="buttons">
</form>
<br>
</div>
</div>

<div class="gallery-item">
<h2 style="font-family: Amita;">Cold drinks:</h2>
<div class="gallery-items">
<form onsubmit="return false;">
    <label for="orangeJuice" style="font-size: 18px; font-family: Amita;">$5.50: Orange Juice</label>
    <input type="number" style="width: 200px;" id="orange" name="orangeJuice" min="1" max="20" placeholder="Amount...">
    <input type="submit" onClick="getOrangeJuice()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="appleJuice" style="font-size: 18px; font-family: Amita;">$5.50: Apple Juice</label>
    <input type="number" style="width: 200px;" id="apple" name="appleJuice" min="1" max="20" placeholder="Amount...">
    <input type="submit" onClick="getAppleJuice()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="lP" style="font-size: 18px; font-family: Amita;">$4: L&P</label>
    <input type="number" style="width: 200px;" id="l" name="lP" min="1" max="20" placeholder="Amount...">
    <input type="submit" onClick="getLP()" value="Add To Order" class="buttons">
</form>
<br>
</div>
</div>

<div class="gallery-item">
<h2 style="font-family: Amita;">Food:</h2>
<div class="gallery-items">
<form onsubmit="return false;">
    <label for="blueberryMuffin" style="font-size: 18px; font-family: Amita;">$5: Blueberry Muffin</label>
    <input type="number" style="width: 200px;" id="blueberry" name="blueberryMuffin" min="1" max="15" placeholder="Amount...">
    <input type="submit" onClick="getBlueberryMuffin()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="cheeseScone" style="font-size: 18px; font-family: Amita;">$6: Cheese Scone</label>
    <input type="number" style="width: 200px;" id="cheese" name="cheeseScone" min="1" max="15" placeholder="Amount...">
    <input type="submit" onClick="getCheeseScone()" value="Add To Order" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="quicheLorraine" style="font-size: 18px; font-family: Amita;">$8: Quiche Lorraine</label>
    <input type="number" style="width: 200px;" id="quiche" name="quicheLorraine" min="1" max="15" placeholder="Amount...">
    <input type="submit" onClick="getQuicheLorraine()" value="Add To Order" class="buttons">
</form>
<br>
</div>
</div>

<br>
<button id="order" class="button" onclick="viewItems()">View items on order:</button>
<div class="gallery-item" style="text-align: center; display: none;" id="spaceForJavaScriptOutput"></div>
<div class="gallery-item" style="display: none;" id="nameMoney">
<div class="gallery-items">
<form onsubmit="return false;" >
    <label for="nameAdd" style="font-size: 20px; font-family: Amita;">Name:</label>
    <input type="text" oninput="this.value = this.value.replace(/[^\p{L}\s-]/gu, '')" id="name" name="nameAdd" minLength="2" placeholder="Name..." required>
    <input type="submit" onClick="getName()" class="buttons">
</form>
<br>
<form onsubmit="return false;">
    <label for="moneyAdd" style="font-size: 20px; font-family: Amita;">Money: $</label>
    <input type="number" id="money" name="moneyAdd" placeholder="$..." step="0.01" required>
    <input type="submit" onClick="getMoney()" class="buttons">
</form>
</div>
</div>
<button id="receipt" onclick="getReceipt()" style="display: none;" class="button">Receipt:</button>
<br>
<button id="clear" onclick="clearAll()" style="display: none;" class="button">Clear All:</button>
<button id="cancel" onclick="cancelAll()" style="display: none;" class="button">Cancel Order</button>
</div>
<br>
<script src="script.js"></script>
</body>
</html>
